---
title: Call Analytics API
emoji: 🎙️
colorFrom: indigo
colorTo: gray
sdk: docker
sdk_version: latest
app_file: app/main.py
port: 8000
hf_oauth: true

# Environment variables required for HF Spaces
env:
  - name: APP_ENV
    description: Application environment (development, staging, production)
    default: production
  - name: DATABASE_URL
    description: PostgreSQL connection string (from Supabase)
    default: ""
  - name: STORAGE_BACKEND
    description: Storage backend (local or s3)
    default: s3
  - name: S3_ENDPOINT_URL
    description: S3 endpoint URL (e.g., Supabase Storage endpoint)
    default: ""
  - name: S3_ACCESS_KEY_ID
    description: S3 access key ID
    default: ""
  - name: S3_SECRET_ACCESS_KEY
    description: S3 secret access key
    default: ""
  - name: S3_BUCKET
    description: S3 bucket name
    default: call-analytics
  - name: ADMIN_PASSWORD
    description: Admin password for API auth
    default: changeme
  - name: SARVAM_API_KEY
    description: Sarvam API key
    default: ""
  - name: GROQ_API_KEY
    description: Groq API key
    default: ""
  - name: OPENROUTER_API_KEY
    description: OpenRouter API key
    default: ""
  - name: LOG_LEVEL
    description: Logging level
    default: INFO
  - name: LOG_FORMAT
    description: Log output format (text or json)
    default: json
  - name: EXPOSE_ERROR_DETAILS
    description: Expose error details in responses
    default: "false"

# Health check endpoint
# HF Spaces will use /ready and /health endpoints defined in the FastAPI app
